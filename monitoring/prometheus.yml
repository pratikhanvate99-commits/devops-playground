global:
  scrape_interval: 2s # Fast scrape interval for real-time dashboard updates
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['gateway:5000']

  - job_name: 'worker-service'
    static_configs:
      - targets: ['worker:5001']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
