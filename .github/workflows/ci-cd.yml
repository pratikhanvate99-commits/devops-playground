name: DevOps Playground CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    name: Code Quality & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Python Worker Linting & Testing
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f services/worker/requirements.txt ]; then pip install -r services/worker/requirements.txt; fi
      - name: Lint Worker Code with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 services/worker --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 services/worker --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      # Node.js API Gateway Linting
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Gateway Dependencies
        run: |
          cd services/gateway
          # npm ci or npm install depending on presence of lock file
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Audit Gateway Dependencies for Security
        run: |
          cd services/gateway
          npm audit --audit-level=high || true
  build-and-scan:
    name: Container Build & Vulnerability Scan
    needs: lint-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, worker, frontend]
        include:
          - service: gateway
            path: ./services/gateway
            image_name: devops-gateway
          - service: worker
            path: ./services/worker
            image_name: devops-worker
          - service: frontend
            path: ./services/frontend
            image_name: devops-frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build Docker Images locally
      - name: Build local image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.path }}
          load: true
          tags: ${{ matrix.image_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy Security Scanning for vulnerabilities
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: '${{ matrix.image_name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Don't fail the build for demonstration, just display warnings
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # Example deployment job (GitOps/Docker Hub push simulation)
  deploy:
    name: Deploy to Registry & Staging
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Log in to Docker Registry (simulated/commented)
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy Announcement
        run: |
          echo "Simulating image push to Docker Registry..."
          echo "Image devops-gateway:latest tagged and ready."
          echo "Image devops-worker:latest tagged and ready."
          echo "Image devops-frontend:latest tagged and ready."
          echo "Simulating automated deployment rollouts via GitOps..."
