apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: devops-playground
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: devops-gateway:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@db:5432/devops_db
            - name: PORT
              value: "5000"
          ports:
            - containerPort: 5000
              name: http
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
